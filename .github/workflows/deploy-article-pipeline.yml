name: Deploy Article Pipeline

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/article-pipeline/**"
      - ".github/workflows/deploy-article-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: xrgdfghiwjyrdckpjzdj
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy article-pipeline
        run: supabase functions deploy article-pipeline --project-ref "$PROJECT_ID" --use-api
