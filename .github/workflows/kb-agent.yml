name: KB Agent sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-kb-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Edge Function kb-agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_KEY:-}" ]; then
            echo "Chybí secrets SUPABASE_URL nebo SUPABASE_SERVICE_KEY."
            exit 1
          fi

          URL="${SUPABASE_URL%/}/functions/v1/kb-agent"
          echo "POST ${URL}"

          HTTP_CODE=$(curl -sS -w "\n%{http_code}" -X POST "${URL}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')

          BODY=$(echo "${HTTP_CODE}" | head -n -1)
          STATUS=$(echo "${HTTP_CODE}" | tail -n 1)

          echo "HTTP status: ${STATUS}"
          echo "Response:"
          echo "${BODY}" | jq . 2>/dev/null || echo "${BODY}"

          if [ "${STATUS}" -lt 200 ] || [ "${STATUS}" -ge 300 ]; then
            echo "kb-agent vrátil chybu HTTP ${STATUS}"
            exit 1
          fi
